name: Mobile Native Preflight

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      takosumi_source_ref:
        description: Takosumi commit or branch used for cross-repo mobile-kit preflight
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: mobile-native-preflight-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache/takos-mobile
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_TOOLCHAIN: 1.93.1
  TAKOSUMI_SOURCE_REF: ${{ inputs.takosumi_source_ref || '6dbfaba43f798c683ef0e4d051eb9245429a0141' }}

jobs:
  repository-contract:
    name: Repository-actionable mobile release contract
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          path: takos-mobile
          persist-credentials: false

      - name: Check out pinned public Takosumi source (remote reachability proof)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          repository: tako0614/takosumi
          ref: ${{ env.TAKOSUMI_SOURCE_REF }}
          path: takosumi
          persist-credentials: false

      - name: Check out Takos product source (remote push backend reference)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          repository: tako0614/takos
          path: takos
          persist-credentials: false

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14

      - name: Install locked Takosumi source dependencies
        run: bun install --frozen-lockfile
        working-directory: takosumi

      - name: Install locked mobile JavaScript dependencies
        run: bun install --frozen-lockfile
        working-directory: takos-mobile

      - name: Run mobile source and web-surface checks
        run: bun run mobile:check
        working-directory: takos-mobile

      - name: Fail repository-actionable release blockers only
        run: bun run mobile:repo-release-check
        working-directory: takos-mobile

  rust-security:
    name: Mobile Rust dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          path: takos-mobile
          persist-credentials: false

      - name: Configure pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"

      - name: Install Rust security audit tool
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit the mobile Cargo lockfile
        run: cargo audit --file takos-mobile/src-tauri/Cargo.lock

  android:
    name: Android project and debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          path: takos-mobile
          persist-credentials: false

      - name: Check out pinned public Takosumi source (remote reachability proof)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          repository: tako0614/takosumi
          ref: ${{ env.TAKOSUMI_SOURCE_REF }}
          path: takosumi
          persist-credentials: false

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14

      - name: Install locked Takosumi source dependencies
        run: bun install --frozen-lockfile
        working-directory: takosumi

      - name: Configure Android native toolchain
        shell: bash
        run: |
          set -euo pipefail
          java_home="${JAVA_HOME_17_X64:-${JAVA_HOME:-}}"
          ndk_home="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-${ANDROID_NDK:-}}}"
          test -n "${java_home}"
          test -x "${java_home}/bin/java"
          test -n "${ANDROID_HOME:-}"
          test -d "${ANDROID_HOME}"
          test -n "${ndk_home}"
          test -d "${ndk_home}"
          echo "JAVA_HOME=${java_home}" >> "${GITHUB_ENV}"
          echo "NDK_HOME=${ndk_home}" >> "${GITHUB_ENV}"
          "${java_home}/bin/java" -version

      - name: Install Android Rust targets
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Install locked mobile JavaScript dependencies
        run: bun install --frozen-lockfile
        working-directory: takos-mobile

      - name: Generate the Android project
        run: bun run tauri:android:init -- --ci
        working-directory: takos-mobile

      - name: Add non-delivery Firebase compile fixture
        shell: bash
        working-directory: takos-mobile
        run: |
          set -euo pipefail
          bun -e '
            const config = {
              project_info: {
                project_number: "000000000000",
                project_id: "takos-mobile-ci-preflight",
                storage_bucket: "takos-mobile-ci-preflight.invalid",
              },
              client: [{
                client_info: {
                  mobilesdk_app_id: "1:000000000000:android:0000000000000000000000",
                  android_client_info: { package_name: "jp.takos.mobile" },
                },
                api_key: [{ current_key: "ci-preflight-not-a-provider-credential" }],
                services: {},
              }],
              configuration_version: "1",
            };
            await Bun.write(
              "src-tauri/gen/android/app/google-services.json",
              `${JSON.stringify(config, null, 2)}\n`,
            );
          '

      - name: Verify generated Android push integration
        run: >-
          bun ../takosumi/mobile-kit/scripts/apply-tauri-mobile-push-native.mjs
          --platform android --dry-run --strict
        working-directory: takos-mobile

      - name: Build unsigned Android debug APK
        run: bun run tauri:android:build -- --debug --target aarch64 --apk --ci
        working-directory: takos-mobile

  ios:
    name: iOS project and no-sign simulator build
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          path: takos-mobile
          persist-credentials: false

      - name: Check out pinned public Takosumi source (remote reachability proof)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          repository: tako0614/takosumi
          ref: ${{ env.TAKOSUMI_SOURCE_REF }}
          path: takosumi
          persist-credentials: false

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14

      - name: Install locked Takosumi source dependencies
        run: bun install --frozen-lockfile
        working-directory: takosumi

      - name: Configure hosted iOS toolchain
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          pod --version

      - name: Install iOS Rust targets
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - name: Install locked mobile JavaScript dependencies
        run: bun install --frozen-lockfile
        working-directory: takos-mobile

      - name: Generate and integrate the iOS project
        run: bun run tauri:ios:init -- --skip-targets-install --ci
        working-directory: takos-mobile

      - name: Verify generated iOS push integration
        run: >-
          bun ../takosumi/mobile-kit/scripts/apply-tauri-mobile-push-native.mjs
          --platform ios --apple-environment development --dry-run --strict
        working-directory: takos-mobile

      - name: Build iOS simulator without signing
        run: bun run tauri:ios:build -- --debug --target aarch64-sim --no-sign --ci
        working-directory: takos-mobile
